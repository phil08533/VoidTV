<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#050e05"/>
  <!-- TV Screen Body -->
  <rect x="64" y="120" width="384" height="252" rx="20" fill="#0a2a0a" stroke="#4ade80" stroke-width="6"/>
  <!-- TV Screen Inner -->
  <rect x="82" y="138" width="348" height="216" rx="10" fill="#050e05"/>
  <!-- Play Triangle -->
  <polygon points="196,186 196,306 336,246" fill="#4ade80" opacity="0.95"/>
  <!-- TV Stand Neck -->
  <rect x="228" y="372" width="56" height="40" fill="#0a2a0a"/>
